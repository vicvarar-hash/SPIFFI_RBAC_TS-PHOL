
services:
  spire-server:
    image: ghcr.io/spiffe/spire-server:1.10.0
    ports:
      - "8081:8081"
    volumes:
      - ./server:/opt/spire/conf/server
      - ./server/data:/opt/spire/data
    command: ["-config", "/opt/spire/conf/server/server.conf"]
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.10.0
    pid: "host"
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - ./agent:/opt/spire/conf/agent
      - ./sockets:/opt/spire/sockets
      - ./agent/data:/opt/spire/data
    command: ["-config", "/opt/spire/conf/agent/agent.conf", "-joinToken", "${SPIRE_TOKEN:-}"]

  spire-socat:
    image: alpine/socat
    pid: "host"
    depends_on:
      - spire-agent
    ports:
      - "8082:8082"
    volumes:
      - ./sockets:/opt/spire/sockets
    command: ["-d", "-d", "TCP-LISTEN:8082,fork,reuseaddr", "UNIX-CONNECT:/opt/spire/sockets/workload_api.sock"]

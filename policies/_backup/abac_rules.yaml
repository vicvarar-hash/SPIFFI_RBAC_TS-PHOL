rules:
# ── Department/Compliance Isolation ──
- id: abac_finance_isolation
  action: "deny"
  description: "Financial compliance resources restricted to Finance department"
  failure_reason: "Access denied: Subject does not belong to the Finance department"
  match_attributes:
    - { source: "resource", attribute: "compliance_tier", value: "Financial", op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Finance", op: "!=" }

- id: abac_pci_isolation
  action: "deny"
  description: "PCI-DSS compliance resources restricted to Finance department"
  failure_reason: "Access denied: PCI-DSS data requires Finance department"
  match_attributes:
    - { source: "resource", attribute: "compliance_tier", value: "PCI-DSS", op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Finance", op: "!=" }

- id: abac_hipaa_restriction
  action: "deny"
  description: "HIPAA compliance requirement for medical data"
  failure_reason: "Access denied: Subject lacks necessary department traits for HIPAA data"
  match_attributes:
    - { source: "resource", attribute: "compliance_tier", value: "HIPAA", op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Medical", op: "!=" }

# ── Data Sensitivity Controls (new: cross-domain data access) ──
- id: abac_financial_data_isolation
  action: "deny"
  description: "Financial data requires Finance or Infrastructure department"
  failure_reason: "Access denied: Financial data restricted to authorized departments"
  match_attributes:
    - { source: "resource", attribute: "data_sensitivity", value: "Financial", op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Finance", op: "!=" }
    - { source: "subject", attribute: "attributes.department", value: "Infrastructure", op: "!=" }

- id: abac_infrastructure_write_isolation
  action: "deny"
  description: "Infrastructure writes require Engineering or Infrastructure department"
  failure_reason: "Access denied: Infrastructure write access restricted"
  match_attributes:
    - { source: "resource", attribute: "data_sensitivity", value: "Infrastructure", op: "==" }
    - { source: "action", attribute: "contains_write", value: true, op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Engineering", op: "!=" }
    - { source: "subject", attribute: "attributes.department", value: "Infrastructure", op: "!=" }

# ── Clearance-Based Access (Action-Sensitive) ──
- id: abac_clearance_write_high_risk
  action: "deny"
  description: "High-risk write operations require L3 clearance"
  failure_reason: "Access denied: L3 clearance required for high-risk write operations"
  match_attributes:
    - { source: "resource", attribute: "risk_level", value: "high", op: "==" }
    - { source: "action", attribute: "contains_write", value: true, op: "==" }
    - { source: "subject", attribute: "attributes.clearance_level", value: "L3", op: "!=" }

- id: abac_clearance_read_high_risk
  action: "deny"
  description: "High-risk read operations require at least L2 clearance"
  failure_reason: "Access denied: Minimum L2 clearance required for high-risk resources"
  match_attributes:
    - { source: "resource", attribute: "risk_level", value: "high", op: "==" }
    - { source: "subject", attribute: "attributes.clearance_level", value: "L1", op: "==" }

# ── Trust-Based Controls ──
- id: abac_low_trust_write
  action: "deny"
  description: "Low-trust agents cannot perform write operations"
  failure_reason: "Access denied: Trust score too low for write operations"
  match_attributes:
    - { source: "action", attribute: "contains_write", value: true, op: "==" }
    - { source: "subject", attribute: "attributes.trust_score", value: "0.8", op: "<" }

- id: abac_beta_trust_denial
  action: "deny"
  description: "Experimental tools denied for low-trust identities"
  failure_reason: "Access denied: Identity trust score too low for experimental boundaries"
  match_attributes:
    - { source: "resource", attribute: "trust_boundary", value: "Experimental", op: "==" }
    - { source: "subject", attribute: "attributes.trust_score", value: "0.85", op: "<" }

# ── Temporal Controls (new: after-hours write restriction) ──
- id: abac_after_hours_write
  action: "deny"
  description: "Write operations on high-risk resources denied outside business hours"
  failure_reason: "Access denied: High-risk write operations restricted to business hours"
  match_attributes:
    - { source: "resource", attribute: "risk_level", value: "high", op: "==" }
    - { source: "action", attribute: "contains_write", value: true, op: "==" }
    - { source: "environment", attribute: "after_hours", value: true, op: "==" }

rules:
- id: abac_finance_isolation
  action: "deny"
  description: "Finance resources are restricted to the Finance department"
  failure_reason: "Access denied: Subject does not belong to the Finance department"
  match_attributes:
    - { source: "resource", attribute: "compliance_tier", value: "Financial", op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Finance", op: "!=" }

- id: abac_hipaa_restriction
  action: "deny"
  description: "HIPAA compliance requirement for medical data"
  failure_reason: "Access denied: Subject lacks necessary department traits for HIPAA data"
  match_attributes:
    - { source: "resource", attribute: "compliance_tier", value: "HIPAA", op: "==" }
    - { source: "subject", attribute: "attributes.department", value: "Medical", op: "!=" }

- id: abac_clearance_enforcement
  action: "deny"
  description: "High-sensitivity data requires L3 clearance"
  failure_reason: "Access denied: Subject clearance level is insufficient for this resource"
  match_attributes:
    - { source: "resource", attribute: "risk_level", value: "high", op: "==" }
    - { source: "subject", attribute: "attributes.clearance_level", value: "L3", op: "!=" }

- id: abac_beta_trust_denial
  action: "deny"
  description: "Experimental tools are denied for low-trust identities"
  failure_reason: "Access denied: Identity trust score is too low for experimental boundaries"
  match_attributes:
    - { source: "resource", attribute: "trust_boundary", value: "Experimental", op: "==" }
    - { source: "subject", attribute: "attributes.trust_score", value: "0.5", op: "<" }

rules:
# ═══════════════════════════════════════════════════════════════════
# DEPARTMENT ISOLATION RULES
# These ensure domain-specific data stays within authorized departments
# ═══════════════════════════════════════════════════════════════════
- id: abac_finance_isolation
  description: Financial compliance resources restricted to Finance department
  action: deny
  failure_reason: 'Access denied: Subject does not belong to the Finance department'
  match_attributes:
  - attribute: compliance_tier
    op: ==
    source: resource
    value: Financial
  - attribute: attributes.department
    op: '!='
    source: subject
    value: Finance

- id: abac_pci_isolation
  description: PCI-DSS compliance resources restricted to Finance department
  action: deny
  failure_reason: 'Access denied: PCI-DSS data requires Finance department'
  match_attributes:
  - attribute: compliance_tier
    op: ==
    source: resource
    value: PCI-DSS
  - attribute: attributes.department
    op: '!='
    source: subject
    value: Finance

- id: abac_hipaa_restriction
  description: HIPAA compliance requirement for medical data
  action: deny
  failure_reason: 'Access denied: Subject lacks necessary department traits for HIPAA data'
  match_attributes:
  - attribute: compliance_tier
    op: ==
    source: resource
    value: HIPAA
  - attribute: attributes.department
    op: '!='
    source: subject
    value: Medical

- id: abac_infrastructure_write_isolation
  description: Infrastructure writes require Engineering or Infrastructure department
  action: deny
  failure_reason: 'Access denied: Infrastructure write access restricted to Engineering/Infrastructure'
  match_attributes:
  - attribute: data_sensitivity
    op: ==
    source: resource
    value: Infrastructure
  - attribute: contains_write
    op: ==
    source: action
    value: true
  - attribute: attributes.department
    op: '!='
    source: subject
    value: Engineering
  - attribute: attributes.department
    op: '!='
    source: subject
    value: Infrastructure

# ═══════════════════════════════════════════════════════════════════
# FINANCIAL WRITE ISOLATION (new - creates RBAC-pass/ABAC-fail zone)
# automation_gateway has RBAC read on Stripe, but if it somehow gets
# a write through, ABAC blocks it based on department
# ═══════════════════════════════════════════════════════════════════
- id: abac_financial_write_requires_finance
  description: Write operations on financial resources require Finance department
  action: deny
  failure_reason: 'Access denied: Financial write operations require Finance department membership'
  match_attributes:
  - attribute: domain
    op: in
    source: resource
    value: ['stripe', 'hummingbot-mcp']
  - attribute: contains_write
    op: ==
    source: action
    value: true
  - attribute: attributes.department
    op: '!='
    source: subject
    value: Finance

# ═══════════════════════════════════════════════════════════════════
# CLEARANCE-BASED ACCESS CONTROL
# Graduated access based on security clearance level
# ═══════════════════════════════════════════════════════════════════
- id: abac_destructive_write_requires_L3
  description: Destructive operations (delete, drop, cancel, refund) require L3 clearance
  action: deny
  failure_reason: 'Access denied: L3 clearance required for destructive operations'
  match_attributes:
  - attribute: contains_destructive_write
    op: ==
    source: action
    value: true
  - attribute: attributes.clearance_level
    op: '!='
    source: subject
    value: L3

- id: abac_clearance_write_high_risk
  description: High-risk write operations require L3 clearance
  action: deny
  failure_reason: 'Access denied: L3 clearance required for high-risk write operations'
  match_attributes:
  - attribute: risk_level
    op: ==
    source: resource
    value: high
  - attribute: contains_write
    op: ==
    source: action
    value: true
  - attribute: attributes.clearance_level
    op: '!='
    source: subject
    value: L3

- id: abac_clearance_read_high_risk
  description: High-risk read operations require at least L2 clearance
  action: deny
  failure_reason: 'Access denied: Minimum L2 clearance required for high-risk resources'
  match_attributes:
  - attribute: risk_level
    op: ==
    source: resource
    value: high
  - attribute: attributes.clearance_level
    op: ==
    source: subject
    value: L1

# ═══════════════════════════════════════════════════════════════════
# TRUST SCORE GATING
# Dynamic trust-based access control
# ═══════════════════════════════════════════════════════════════════
- id: abac_low_trust_write
  description: Low-trust agents cannot perform write operations
  action: deny
  failure_reason: 'Access denied: Trust score too low for write operations'
  match_attributes:
  - attribute: contains_write
    op: ==
    source: action
    value: true
  - attribute: attributes.trust_score
    op: <
    source: subject
    value: '0.8'

- id: abac_low_trust_privileged_write
  description: Privileged writes require trust score of at least 0.9
  action: deny
  failure_reason: 'Access denied: Trust score too low for privileged write operations'
  match_attributes:
  - attribute: contains_privileged_write
    op: ==
    source: action
    value: true
  - attribute: attributes.trust_score
    op: <
    source: subject
    value: '0.9'

- id: abac_beta_trust_denial
  description: Experimental tools denied for low-trust identities
  action: deny
  failure_reason: 'Access denied: Identity trust score too low for experimental boundaries'
  match_attributes:
  - attribute: trust_boundary
    op: ==
    source: resource
    value: Experimental
  - attribute: attributes.trust_score
    op: <
    source: subject
    value: '0.85'

# ═══════════════════════════════════════════════════════════════════
# MULTI-TOOL WRITE GATING (new - catches bulk write escalation)
# ═══════════════════════════════════════════════════════════════════
- id: abac_multi_tool_write_high_trust
  description: Requests with 3+ write tools require trust score of at least 0.9
  action: deny
  failure_reason: 'Access denied: Multiple write operations require elevated trust level'
  match_attributes:
  - attribute: write_tool_count
    op: '>='
    source: action
    value: '3'
  - attribute: attributes.trust_score
    op: <
    source: subject
    value: '0.9'

# ═══════════════════════════════════════════════════════════════════
# TEMPORAL CONTROLS
# ═══════════════════════════════════════════════════════════════════
- id: abac_after_hours_write
  description: Write operations on high-risk resources denied outside business hours
  action: deny
  failure_reason: 'Access denied: High-risk write operations restricted to business hours'
  match_attributes:
  - attribute: risk_level
    op: ==
    source: resource
    value: high
  - attribute: contains_write
    op: ==
    source: action
    value: true
  - attribute: after_hours
    op: ==
    source: environment
    value: true

policies:
- spiffe_id: spiffe://demo.local/agent/incident
  description: Incident lifecycle and escalation
  rules:
  - mcp: grafana
    tools:
    - query_prometheus
    - find_error_pattern_logs
    - list_alert_rules
    - list_sift_investigations
    - add_activity_to_incident
    - list_incidents
    - create_incident
    - get_incident
    - list_oncall_users
    - list_oncall_schedules
    action: allow
  - mcp: atlassian
    tools:
    - jira_get_issue
    - jira_add_comment
    - jira_create_issue
    - jira_transition_issue
    action: allow
- spiffe_id: spiffe://demo.local/agent/finance
  description: Financial operations and subscriptions
  rules:
  - mcp: stripe
    tools:
    - '*'
    action: allow
  - mcp: grafana
    tools:
    - '*'
    action: deny
  - mcp: hummingbot-mcp
    tools:
    - get_positions
    - get_portfolio_balances
    - get_order_book
    action: allow
- spiffe_id: spiffe://demo.local/agent/research
  description: Low-risk research and knowledge tasks
  rules:
  - mcp: wikipedia-mcp
    tools:
    - '*'
    action: allow
  - mcp: paper-search
    tools:
    - '*'
    action: allow
  - mcp: notion
    tools:
    - API-post-search
    - API-retrieve-a-page
    - API-get-block-children
    action: allow
  - mcp: stripe
    tools:
    - '*'
    action: deny
- spiffe_id: spiffe://demo.local/service/gateway
  description: Automation Gateway executes approved tool operations
  rules:
  - mcp: '*'
    tools:
    - '*'
    action: allow
- spiffe_id: spiffe://demo.local/service/security
  description: Security Engine evaluates policy and does not execute business tools
  rules: []
- spiffe_id: spiffe://demo.local/agent/devops
  description: ''
  rules:
  - mcp: grafana
    tools:
    - query_prometheus
    - find_error_pattern_logs
    - list_alert_rules
    - list_sift_investigations
    - add_activity_to_incident
    - list_oncall_users
    - list_oncall_schedules
    - get_dashboard_summary
    - get_dashboard_by_uid
    - get_datasource_by_name
    - get_datasource_by_uid
    - generate_deeplink
    action: allow
  - mcp: atlassian
    tools:
    - jira_get_issue
    - jira_get_project_issues
    - jira_get_board_issues
    - jira_search
    - jira_add_comment
    - jira_create_issue
    - jira_link_to_epic
    action: allow
  - mcp: stripe
    tools:
    - '*'
    action: deny
  - mcp: hummingbot-mcp
    tools:
    - '*'
    action: deny

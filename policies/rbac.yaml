policies:
# ═══════════════════════════════════════════════════════════════════
# DevOps Agent: Full access (read + all writes) on Grafana, Atlassian, Azure, MongoDB
# ═══════════════════════════════════════════════════════════════════
- description: Full RBAC for devops_agent - Engineering power user
  spiffe_id: spiffe://demo.local/agent/devops
  rules:
  - rule_name: allow_grafana_full
    mcp: grafana
    action: allow
    tools: ['*']
  - rule_name: allow_atlassian_full
    mcp: atlassian
    action: allow
    tools: ['*']
  - rule_name: allow_azure_full
    mcp: azure
    action: allow
    tools: ['*']
  - rule_name: allow_mongodb_full
    mcp: mongodb
    action: allow
    tools: ['*']
  - rule_name: default_deny
    mcp: '*'
    action: deny
    tools: ['*']

# ═══════════════════════════════════════════════════════════════════
# Incident Agent: Grafana + Atlassian, read + benign_write only
# Can triage, comment, transition issues — cannot create/update/delete
# ═══════════════════════════════════════════════════════════════════
- description: Incident triage RBAC - read + benign writes only
  spiffe_id: spiffe://demo.local/agent/incident
  rules:
  # Grafana: all reads + add_activity_to_incident
  - rule_name: allow_grafana_read
    mcp: grafana
    action: allow
    tools:
    - fetch_pyroscope_profile
    - find_error_pattern_logs
    - find_slow_requests
    - generate_deeplink
    - get_alert_rule_by_uid
    - get_assertions
    - get_current_oncall_users
    - get_dashboard_by_uid
    - get_dashboard_panel_queries
    - get_dashboard_property
    - get_dashboard_summary
    - get_datasource_by_name
    - get_datasource_by_uid
    - get_incident
    - get_oncall_shift
    - get_sift_analysis
    - get_sift_investigation
    - list_alert_rules
    - list_contact_points
    - list_datasources
    - list_incidents
    - list_loki_label_names
    - list_loki_label_values
    - list_oncall_schedules
    - list_oncall_teams
    - list_oncall_users
    - list_prometheus_label_names
    - list_prometheus_label_values
    - list_prometheus_metric_metadata
    - list_prometheus_metric_names
    - list_pyroscope_label_names
    - list_pyroscope_label_values
    - list_pyroscope_profile_types
    - list_sift_investigations
    - list_teams
    - list_users_by_org
    - query_loki_logs
    - query_loki_stats
    - query_prometheus
    - search_dashboards
    - add_activity_to_incident
  # Atlassian: reads + benign writes (comment, transition, link)
  - rule_name: allow_atlassian_read_and_triage
    mcp: atlassian
    action: allow
    tools:
    - confluence_get_comments
    - confluence_get_labels
    - confluence_get_page
    - confluence_get_page_children
    - confluence_search
    - jira_batch_get_changelogs
    - jira_download_attachments
    - jira_get_agile_boards
    - jira_get_board_issues
    - jira_get_issue
    - jira_get_link_types
    - jira_get_project_issues
    - jira_get_project_versions
    - jira_get_sprint_issues
    - jira_get_sprints_from_board
    - jira_get_user_profile
    - jira_get_worklog
    - jira_search
    - jira_search_fields
    - jira_get_transitions
    - jira_add_comment
    - jira_add_worklog
    - jira_transition_issue
    - jira_link_to_epic
    - jira_create_issue_link
    - confluence_add_comment
    - confluence_add_label
  - rule_name: default_deny
    mcp: '*'
    action: deny
    tools: ['*']

# ═══════════════════════════════════════════════════════════════════
# Finance Agent: Stripe + Hummingbot, read + privileged writes (no destructive)
# Can manage billing/invoices but cannot refund, cancel, or execute trades
# ═══════════════════════════════════════════════════════════════════
- description: Finance operations RBAC - no destructive financial operations
  spiffe_id: spiffe://demo.local/agent/finance
  rules:
  # Stripe: reads + privileged writes (no cancel_subscription, create_refund)
  - rule_name: allow_stripe_operations
    mcp: stripe
    action: allow
    tools:
    - finalize_invoice
    - list_coupons
    - list_customers
    - list_invoices
    - list_payment_intents
    - list_prices
    - list_products
    - list_subscriptions
    - retrieve_balance
    - search_stripe_documentation
    - create_coupon
    - create_customer
    - create_invoice
    - create_invoice_item
    - create_payment_link
    - create_price
    - create_product
    - list_disputes
    - update_dispute
    - update_subscription
  # Hummingbot: reads only (no trading execution)
  - rule_name: allow_hummingbot_read
    mcp: hummingbot-mcp
    action: allow
    tools:
    - explore_controllers
    - get_active_bots_status
    - get_candles
    - get_funding_rate
    - get_order_book
    - get_orders
    - get_portfolio_balances
    - get_positions
    - get_prices
  - rule_name: default_deny
    mcp: '*'
    action: deny
    tools: ['*']

# ═══════════════════════════════════════════════════════════════════
# Research Agent: Wikipedia + Notion, read-only
# Pure information discovery — zero writes
# ═══════════════════════════════════════════════════════════════════
- description: Research read-only RBAC - information discovery only
  spiffe_id: spiffe://demo.local/agent/research
  rules:
  # Wikipedia: all tools (all are reads)
  - rule_name: allow_wikipedia_read
    mcp: wikipedia-mcp
    action: allow
    tools:
    - extract_key_facts
    - get_article
    - get_coordinates
    - get_links
    - get_related_topics
    - get_sections
    - get_summary
    - search_wikipedia
    - summarize_article_for_query
    - summarize_article_section
  # Notion: read-only tools
  - rule_name: allow_notion_read
    mcp: notion
    action: allow
    tools:
    - API-get-block-children
    - API-get-self
    - API-get-user
    - API-get-users
    - API-retrieve-a-block
    - API-retrieve-a-comment
    - API-retrieve-a-database
    - API-retrieve-a-page
    - API-retrieve-a-page-property
  - rule_name: default_deny
    mcp: '*'
    action: deny
    tools: ['*']


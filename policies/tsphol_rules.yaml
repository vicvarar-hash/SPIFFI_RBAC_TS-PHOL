rules:
# ═══════════════════════════════════════════════════════════════════
# HIGHEST PRIORITY: Safety-Critical Gates
# These catch what RBAC and ABAC cannot — LLM behavioral issues
# ═══════════════════════════════════════════════════════════════════
- rule_name: low_confidence_write_prevention
  description: Deny destructive write operations if LLM confidence is below 0.75
  if:
    - predicate: ContainsWrite
      equals: true
    - predicate: ConfidenceValue
      lt: 0.75
  then: DENY
  derive: LowConfidenceWrite
  priority: 130

- rule_name: high_risk_write_confidence_safeguard
  description: High-risk write resources require at least 0.85 confidence
  if:
    - predicate: HighestRiskLevel
      equals: high
    - predicate: ContainsWrite
      equals: true
    - predicate: ConfidenceValue
      lt: 0.85
  then: DENY
  derive: HighRiskLowConfidence
  priority: 125

# ═══════════════════════════════════════════════════════════════════
# DOMAIN & STRUCTURAL GATES
# Catch domain mismatches and ABAC propagation
# ═══════════════════════════════════════════════════════════════════
- rule_name: task_bundle_domain_mismatch
  description: Deny when the proposed bundle belongs to a different domain than the task
  if:
    - predicate: TaskBundleDomainMismatch
      equals: true
    - predicate: SelectionToleranceActive
      equals: false
  then: DENY
  derive: IrrelevantBundle
  priority: 120

- rule_name: validation_failure_denial
  description: Deny when validation explicitly determines the bundle is invalid for the task
  if:
    - predicate: CriticalValidationFailure
      equals: true
  then: DENY
  derive: TaskMismatch
  priority: 110

# ═══════════════════════════════════════════════════════════════════
# CAPABILITY COVERAGE (Two-Tier: only hard misses deny)
# This is a unique TS-PHOL value — catches same-domain wrong bundles
# ═══════════════════════════════════════════════════════════════════
- rule_name: hard_capability_violation
  description: Deny when a mission-critical capability is missing from the tool bundle
  if:
    - predicate: HardCapabilityMissing
      equals: true
    - predicate: SelectionToleranceActive
      equals: false
  then: DENY
  derive: CriticalCapabilityGap
  priority: 105

# ═══════════════════════════════════════════════════════════════════
# WRITE SAFETY (destructive operations only)
# Catches delete/drop without preceding read verification
# ═══════════════════════════════════════════════════════════════════
- rule_name: destructive_write_prevention
  description: Deny destructive operations (delete/drop) without accompanying read verification
  if:
    - predicate: ContainsDelete
      equals: true
    - predicate: ContainsRead
      equals: false
  then: DENY
  derive: UnsafeDestructiveWrite
  priority: 100

# ═══════════════════════════════════════════════════════════════════
# RISK DETECTION & GATING
# Multi-domain high-risk scenarios require very high confidence
# ═══════════════════════════════════════════════════════════════════
- rule_name: elevated_risk_detection
  description: Identify high-risk multi-domain scenarios
  if:
    - predicate: HighestRiskLevel
      equals: high
    - predicate: MultiDomain
      equals: true
  then: ALLOW
  derive: ElevatedRisk
  priority: 80

- rule_name: elevated_risk_confidence
  description: Deny elevated risk missions if confidence is below 0.90
  if:
    - predicate: ElevatedRisk
      equals: true
    - predicate: ConfidenceValue
      lt: 0.90
  then: DENY
  priority: 70

# ═══════════════════════════════════════════════════════════════════
# ALIGNMENT GATES
# Catches semantically irrelevant bundles (wrong tools for the task)
# ═══════════════════════════════════════════════════════════════════
- rule_name: low_task_alignment
  description: Deny when the bundle is semantically irrelevant to the task
  if:
    - predicate: AlignmentEvaluated
      equals: true
    - predicate: TaskAlignmentScore
      lt: 0.4
    - predicate: SelectionToleranceActive
      equals: false
  then: DENY
  derive: LowAlignment
  priority: 60

- rule_name: low_task_alignment_with_tolerance
  description: Deny when the bundle is semantically irrelevant to the task, even with tolerance
  if:
    - predicate: AlignmentEvaluated
      equals: true
    - predicate: TaskAlignmentScore
      lt: 0.3
    - predicate: SelectionToleranceActive
      equals: true
  then: DENY
  derive: LowAlignment
  priority: 60
